# queries_memes.yaml — Phase 0 P0-G4 eval set
#
# Schema (per docs/PHASE_0_RETRIEVAL_PLAN.md §7 and docs/eval_protocol.md):
#
#   query_id         : stable UUID so eval.runs / eval.run_results / eval.qrels align
#                      across re-runs (hardcoded so a fresh DB volume does not break history)
#   text             : user-facing query string exactly as issued to /search
#   intent           : one of exact_text | fuzzy_text | semantic_description | mixed_visual_description
#                      (CHECK constraint on eval.queries.intent)
#   target_image_id  : single image_id or list of image_ids that a correct system must return in the top-10.
#                      NULL = not yet judged (see data-entry TODO below). Populating this is blocker F.
#   qrels            : list of {image_id, grade} where grade ∈ 0..3 per eval_protocol.md.
#                      Used by the runner when the eval.qrels table is empty.
#   notes            : free-text hint for the human judge
#
# Class balance: EXACTLY 10/10/10/10 per retrieval_plan §7.1.
#
# Data-entry TODO (blocker F):
#   After the first full `data/meme` ingest lands, walk these 40 queries against the retrieval stack,
#   pick the real image_ids that match, and fill `target_image_id` + `qrels` below. The runner
#   will treat an empty `qrels` list as "no graded data yet, report retrieval metrics as 0.0".
#
# Note: `target_image_id` is a CONVENIENCE field for the YAML; the canonical graded relevance lives
# in the `qrels` list so multi-image positives are first-class.

queries:
  # ───────────────────────── exact_text (10) ─────────────────────────
