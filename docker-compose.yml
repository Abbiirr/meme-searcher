services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vidsearch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vidsearch}
      POSTGRES_DB: ${POSTGRES_DB:-vidsearch}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./infra/postgres/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
      - ./infra/postgres/002_captions.sql:/docker-entrypoint-initdb.d/002_captions.sql
      - ./infra/postgres/003_feedback_loop.sql:/docker-entrypoint-initdb.d/003_feedback_loop.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vidsearch}"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.13.1
    ports:
      - "${QDRANT_HTTP_HOST_PORT:-6333}:6333"
      - "${QDRANT_GRPC_HOST_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vidsearch}:${POSTGRES_PASSWORD:-vidsearch}@postgres:5432/${POSTGRES_DB:-vidsearch}
      QDRANT_URL: http://qdrant:6333
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET_THUMBNAILS: ${MINIO_BUCKET_THUMBNAILS:-thumbnails}
      MINIO_ENDPOINT: minio:9000
      VIDSEARCH_MODEL_ROOT: /app/models
      VIDSEARCH_DATA_ROOT: /app/data
      VIDSEARCH_MEDIA_URL_MODE: ${VIDSEARCH_MEDIA_URL_MODE:-file}
      VIDSEARCH_ENABLE_CAPTIONS: ${VIDSEARCH_ENABLE_CAPTIONS:-true}
      VIDSEARCH_ENABLE_VISUAL_QUERY: ${VIDSEARCH_ENABLE_VISUAL_QUERY:-false}
      VIDSEARCH_PREWARM_RETRIEVAL: ${VIDSEARCH_PREWARM_RETRIEVAL:-true}
      VIDSEARCH_RERANK_TOP_K_EXACT: ${VIDSEARCH_RERANK_TOP_K_EXACT:-10}
      VIDSEARCH_RERANK_TOP_K_FUZZY: ${VIDSEARCH_RERANK_TOP_K_FUZZY:-10}
      VIDSEARCH_RERANK_TOP_K_SEMANTIC: ${VIDSEARCH_RERANK_TOP_K_SEMANTIC:-10}
      VIDSEARCH_RERANK_TOP_K_MIXED: ${VIDSEARCH_RERANK_TOP_K_MIXED:-12}
      VIDSEARCH_FEEDBACK_ENABLED: ${VIDSEARCH_FEEDBACK_ENABLED:-true}
      VIDSEARCH_FEEDBACK_SECRET: ${VIDSEARCH_FEEDBACK_SECRET:-change-me-local-secret}
      VIDSEARCH_USER_HASH_SECRET: ${VIDSEARCH_USER_HASH_SECRET:-change-me-local-user-hash-secret}
      VIDSEARCH_FEEDBACK_TOKEN_TTL_SECONDS: ${VIDSEARCH_FEEDBACK_TOKEN_TTL_SECONDS:-86400}
      VIDSEARCH_FEEDBACK_RANKER_SHADOW: ${VIDSEARCH_FEEDBACK_RANKER_SHADOW:-false}
      VIDSEARCH_FEEDBACK_RANKER_ENABLED: ${VIDSEARCH_FEEDBACK_RANKER_ENABLED:-false}
      VIDSEARCH_FEEDBACK_RANKER_VERSION: ${VIDSEARCH_FEEDBACK_RANKER_VERSION:-baseline}
      VIDSEARCH_FEEDBACK_RANKER_ARTIFACT: ${VIDSEARCH_FEEDBACK_RANKER_ARTIFACT:-}
      VIDSEARCH_FEEDBACK_RANKER_ALPHA: ${VIDSEARCH_FEEDBACK_RANKER_ALPHA:-0.15}
      VIDSEARCH_FEEDBACK_MAX_UPWARD_MOVEMENT: ${VIDSEARCH_FEEDBACK_MAX_UPWARD_MOVEMENT:-5}
      VIDSEARCH_FEEDBACK_SESSION_RATE_LIMIT_PER_HOUR: ${VIDSEARCH_FEEDBACK_SESSION_RATE_LIMIT_PER_HOUR:-60}
      VIDSEARCH_FEEDBACK_USER_RATE_LIMIT_PER_DAY: ${VIDSEARCH_FEEDBACK_USER_RATE_LIMIT_PER_DAY:-300}
      VIDSEARCH_EXPLORATION_RATE: ${VIDSEARCH_EXPLORATION_RATE:-0.0}
      VIDSEARCH_CAPTION_MODEL: ${VIDSEARCH_CAPTION_MODEL:-vision}
      VIDSEARCH_CAPTION_MODEL_FALLBACK: ${VIDSEARCH_CAPTION_MODEL_FALLBACK:-qwen3.6-vlm-wrapper}
      VIDSEARCH_OCR_MODEL: ${VIDSEARCH_OCR_MODEL:-glm-ocr-wrapper}
      VIDSEARCH_OCR_MODEL_FALLBACK: ${VIDSEARCH_OCR_MODEL_FALLBACK:-glm-ocr}
      VIDSEARCH_OCR_FALLBACK_MODEL: ${VIDSEARCH_OCR_FALLBACK_MODEL:-glm-ocr}
      VIDSEARCH_OCR_FALLBACK_MODEL_FALLBACK: ${VIDSEARCH_OCR_FALLBACK_MODEL_FALLBACK:-glm-ocr}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_URL: ${LITELLM_INTERNAL_URL:-http://host.docker.internal:4000}
    ports:
      - "${VIDSEARCH_API_HOST_PORT:-8000}:8000"
    volumes:
      - ${VIDSEARCH_DATA_ROOT:-./data}:/app/data:ro
      - ${VIDSEARCH_MODEL_ROOT:-./models}:/app/models:ro
      - ./artifacts:/app/artifacts:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.9.1
    environment:
      OPENAI_API_BASE_URL: ${LITELLM_INTERNAL_URL:-http://host.docker.internal:4000}
      OPENAI_API_KEY: ${LITELLM_MASTER_KEY}
      RAG_EMBEDDING_ENGINE: ${OPEN_WEBUI_RAG_EMBEDDING_ENGINE:-openai}
      RAG_OPENAI_API_BASE_URL: ${LITELLM_INTERNAL_URL:-http://host.docker.internal:4000}
      RAG_OPENAI_API_KEY: ${LITELLM_MASTER_KEY}
      RAG_EMBEDDING_MODEL: ${OPEN_WEBUI_RAG_EMBEDDING_MODEL:-nomic-embed-text}
      WEBUI_SECRET_KEY: ${OPEN_WEBUI_SECRET_KEY:-open-webui-local-dev-secret}
      ENABLE_DIRECT_CONNECTIONS: "false"
      PORT: 8080
      VIDSEARCH_OWUI_SEARCH_URL: ${VIDSEARCH_OWUI_SEARCH_URL:-http://api:8000}
      VIDSEARCH_PUBLIC_BASE_URL: ${VIDSEARCH_PUBLIC_BASE_URL:-http://127.0.0.1:8000}
      VIDSEARCH_OWUI_LIMIT: ${VIDSEARCH_OWUI_LIMIT:-5}
      OPEN_WEBUI_ADMIN_EMAIL: ${OPEN_WEBUI_ADMIN_EMAIL:-admin@localhost}
      OPEN_WEBUI_ADMIN_PASSWORD: ${OPEN_WEBUI_ADMIN_PASSWORD:-admin}
      OPEN_WEBUI_ADMIN_NAME: ${OPEN_WEBUI_ADMIN_NAME:-Admin}
      OPEN_WEBUI_PROVISION_WAIT_SECONDS: ${OPEN_WEBUI_PROVISION_WAIT_SECONDS:-600}
    ports:
      - "${OPEN_WEBUI_HOST_PORT:-3000}:8080"
    volumes:
      - open-webui-data:/app/backend/data
      - ./infra/open_webui:/app/vidsearch_open_webui:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["bash", "/app/vidsearch_open_webui/start-with-bootstrap.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      start_period: 300s
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  qdrant-data:
  minio-data:
  open-webui-data:
